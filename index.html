<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- Start Screen -->
    <div class="screen" id="start-screen">
      <div class="card">
        <h1>Quiz Game</h1>
        <p>Test your knowledge with 10 questions!</p>
        <button id="start-btn">Start Quiz</button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div class="screen hidden" id="quiz-screen">
      <div class="card">
        <div class="quiz-header">
          <span id="question-number">Question 1 / 10</span>
          <span id="score-display">Score: 0</span>
        </div>
        <div id="timer">⏱ <span id="timer-count">60</span>s</div>
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <p id="question-text">Question goes here</p>
        <div id="options-container"></div>
        <button id="next-btn" class="hidden">Next →</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div class="screen hidden" id="result-screen">
      <div class="card">
        <div id="result-emoji"></div>
        <h2 id="result-title"></h2>
        <p id="result-score"></p>
        <p id="result-message"></p>
        <div class="result-btns">
          <button id="restart-btn">▶ Play Again</button>
          <button id="exit-btn">✕ Exit</button>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
